<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Geometry Demo</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #1b1b1f;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      gap: 12px;
      padding: 16px;
      box-sizing: border-box;
    }
    #status { font-size: 14px; opacity: 0.8; }
    canvas#canvas {
      background: #000;
      outline: none;
      max-width: 100%;
      border-radius: 6px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="status">Loading...</div>
    <canvas id="canvas" width="900" height="700" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>
  <script>
    var statusElement = document.getElementById('status');
    var Module = {
      canvas: document.getElementById('canvas'),
      setStatus: function (text) {
        statusElement.innerHTML = text;
        if (!text) statusElement.style.display = 'none';
      },
      print: function (text) { console.log(text); },
      printErr: function (text) { console.error(text); }
    };
    Module.setStatus('Downloading...');
    window.onerror = function () {
      Module.setStatus('Something went wrong - see the JavaScript console.');
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
